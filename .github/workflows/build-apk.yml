name: Build Android APK

on:
  # 1. 触发条件优化：保留手动触发，将自动触发改为仅当推送标签时（如 v1.0.0）
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # 2. 编译优化：增加 assembleRelease，用于生成正式发布的 APK
      - name: Build Debug and Release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      # 3. 保留 Debug 包作为构建产物（供开发者测试）
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pedigree-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 4. 修复上传组件：替换为社区更主流、维护更活跃的 softprops/action-gh-release
      - name: Upload Release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true  # 自动根据 commit 生成更新日志
