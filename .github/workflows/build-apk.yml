name: Build Android APK

on:
  # 1. 触发条件：仅当推送标签时（如 v1.0.0）或手动触发
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许在 GitHub 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予工作流创建 Release 和写入仓库内容的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # 2. 核心修复：从 Secrets 恢复 Keystore 签名文件
      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/keystore.jks

      # 3. 编译优化：注入签名环境变量，并生成正式发布的 APK
      - name: Build Debug and Release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease --stacktrace --no-daemon
        env:
          # 将 GitHub Secrets 注入为环境变量，供 build.gradle 读取
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 4. 保留 Debug 包作为构建产物（供开发者测试）
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pedigree-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 5. 上传 Release APK 到 GitHub Release
      - name: Upload Release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true  # 自动根据 commit 生成更新日志
