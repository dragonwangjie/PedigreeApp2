name: Build Android APK

on:
  # 1. 触发条件：仅当推送标签时（如 v1.0.0）或手动触发
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许在 GitHub 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予工作流创建 Release 和写入仓库内容的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # 2. 核心修复：从 Secrets 恢复 Keystore 签名文件，并增加验证
      - name: Decode and Verify Keystore
        run: |
          echo "🔍 开始解码 keystore..."
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/keystore.jks
          
          echo "📝 检查解码后的文件信息："
          ls -lh app/keystore.jks
          
          echo "🔎 检查文件类型："
          file app/keystore.jks
          
          echo "✅ 尝试列出 keystore 内容以验证其完整性："
          keytool -list -keystore app/keystore.jks -storepass ${{ secrets.KEY_STORE_PASSWORD }}

      # 3. 编译优化：使用 setup-gradle 提供的 gradle 命令，注入签名环境变量并生成 APK
      - name: Build Debug and Release APK
        run: |
          gradle --version
          gradle assembleDebug assembleRelease --stacktrace --no-daemon
        env:
          # 将 GitHub Secrets 注入为环境变量，供 build.gradle 读取
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 4. 保留 Debug 包作为构建产物（供开发者测试）
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pedigree-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 5. 上传 Release APK 到 GitHub Release
      - name: Upload Release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true  # 自动根据 commit 生成更新日志
